apiVersion: apps/v1
kind: Deployment
metadata:
  name: boomi-mcp-server
  namespace: default
  labels:
    app: boomi-mcp
    component: server
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: boomi-mcp
      component: server
  template:
    metadata:
      labels:
        app: boomi-mcp
        component: server
    spec:
      serviceAccountName: boomi-mcp
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: boomi-mcp-server
        image: boomi-mcp-server:latest
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 8000
          protocol: TCP

        env:
        # Server Configuration
        - name: MCP_HOST
          value: "0.0.0.0"
        - name: MCP_PORT
          value: "8000"
        - name: MCP_PATH
          value: "/mcp"
        - name: LOG_LEVEL
          value: "info"

        # JWT Authentication (from ConfigMap)
        - name: MCP_JWT_ALG
          valueFrom:
            configMapKeyRef:
              name: boomi-mcp-config
              key: jwt_algorithm
        - name: MCP_JWT_ISSUER
          valueFrom:
            configMapKeyRef:
              name: boomi-mcp-config
              key: jwt_issuer
        - name: MCP_JWT_AUDIENCE
          valueFrom:
            configMapKeyRef:
              name: boomi-mcp-config
              key: jwt_audience

        # JWT Secret or JWKS URI (from Secret)
        - name: MCP_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: boomi-mcp-jwt
              key: secret
              optional: true
        - name: MCP_JWT_JWKS_URI
          valueFrom:
            secretKeyRef:
              name: boomi-mcp-jwt
              key: jwks_uri
              optional: true

        # Cloud Secrets Backend (from ConfigMap)
        - name: SECRETS_BACKEND
          valueFrom:
            configMapKeyRef:
              name: boomi-mcp-config
              key: secrets_backend

        # AWS Configuration (if using AWS Secrets Manager)
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: boomi-mcp-config
              key: aws_region
              optional: true

        # GCP Configuration (if using GCP Secret Manager)
        - name: GCP_PROJECT_ID
          valueFrom:
            configMapKeyRef:
              name: boomi-mcp-config
              key: gcp_project_id
              optional: true

        # Azure Configuration (if using Azure Key Vault)
        - name: AZURE_KEY_VAULT_URL
          valueFrom:
            configMapKeyRef:
              name: boomi-mcp-config
              key: azure_keyvault_url
              optional: true

        # CORS Configuration
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: boomi-mcp-config
              key: cors_origins

        # OAuth observability (default ON since 2026-05-18; pinned here
        # so the manifest reflects the intended state and a future
        # default flip can't silently turn it off). Disable with
        # BOOMI_OAUTH_DIAGNOSTICS_DISABLE=true instead of removing this.
        - name: BOOMI_OAUTH_DIAGNOSTICS
          value: "true"

        # Cross-instance shared refresh-token grace cache (Fix D from
        # PR #34). The code default in
        # rt_grace_shared_backend.initialize_shared_grace_backend is
        # already "true"; we pin it here so the manifest reflects the
        # intended state and a future default flip can't silently turn
        # it off. Shared reads degrade to local exchange on Mongo outage
        # (no hard 401), so leaving this on is safe.
        - name: BOOMI_RT_GRACE_SHARED
          value: "true"

        # Distributed grace lock (Fix D.2 from PR #34). DISABLED, but the
        # original blocker is fixed: the async lock client + collection + TTL
        # index are now built lazily on the serving event loop (2026-05-29), so
        # the "Future attached to a different loop" Motor bug no longer applies.
        # The lock stays opt-in pending operational need -- durable recovery
        # plus the shared grace cache (Fix D, above) already provide
        # cross-instance correctness without it. Enable only if logs show
        # duplicate cross-replica refreshes that those layers do not absorb.
        - name: BOOMI_RT_GRACE_DISTRIBUTED_LOCK
          value: "false"

        # Boomi Docs Knowledge Base (optional retrieval layer)
        - name: BOOMI_DOCS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: boomi-mcp-config
              key: boomi_docs_enabled
              optional: true
        - name: BOOMI_DOCS_DB_PATH
          value: "/app/kb/boomi_knowledge_db"

        # Resource limits
        # Sized for the KB retrieval stack (sentence-transformers + Chroma).
        # KB-disabled deployments can run leaner, but these limits are safe for both.
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi

        # Probes
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL

      # Pod disruption budget for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - boomi-mcp
              topologyKey: kubernetes.io/hostname
